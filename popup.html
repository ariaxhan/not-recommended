<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Not Recommended</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <p class="kicker">Not Recommended</p>
      <h1>Feed controls.</h1>
      <div class="settings" role="group" aria-label="YouTube settings">
        <label><span>Extension enabled</span><input type="checkbox" id="enabled"></label>
        <label><span>Hide YouTube sidebars</span><input type="checkbox" id="hideSidebar"></label>
        <label><span>Hide Shorts</span><input type="checkbox" id="hideShorts"></label>
        <label><span>Hide comments</span><input type="checkbox" id="hideComments"></label>
        <label><span>Ask why before videos</span><input type="checkbox" id="intentPrompt"></label>
      </div>
      <button id="openHome" type="button">Open clean home</button>
      <p class="footnote">Settings stay in this browser. Random articles come from Wikipedia.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
